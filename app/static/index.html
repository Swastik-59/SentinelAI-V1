<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SentinelAI - Demo UI</title>
    <style>
      :root {
        --bg: #0b0f14;
        --panel: #111822;
        --ink: #e6edf3;
        --muted: #9fb0c0;
        --accent: #35d0ba;
        --accent-2: #ffb86b;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "Space Grotesk", "Segoe UI", system-ui, -apple-system, sans-serif;
        color: var(--ink);
        background: radial-gradient(1200px 600px at 10% -10%, #14334a 0%, var(--bg) 55%),
                    radial-gradient(900px 700px at 90% 10%, #1d2b35 0%, var(--bg) 60%);
      }
      .wrap {
        max-width: 1100px;
        margin: 0 auto;
        padding: 48px 20px 80px;
      }
      .hero {
        display: grid;
        grid-template-columns: 1.1fr 0.9fr;
        gap: 28px;
        align-items: center;
      }
      .title {
        font-size: 42px;
        line-height: 1.1;
        margin: 0 0 12px;
      }
      .subtitle {
        color: var(--muted);
        margin: 0 0 24px;
      }
      .card {
        background: linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.02));
        border: 1px solid rgba(255,255,255,0.08);
        border-radius: 16px;
        padding: 20px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.35);
      }
      textarea {
        width: 100%;
        min-height: 240px;
        border-radius: 12px;
        border: 1px solid rgba(255,255,255,0.12);
        background: #0c1219;
        color: var(--ink);
        padding: 12px;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
        font-size: 13px;
      }
      input, select {
        background: #0c1219;
        color: var(--ink);
        border: 1px solid rgba(255,255,255,0.12);
        border-radius: 10px;
        padding: 10px 12px;
        min-width: 160px;
      }
      .field {
        display: flex;
        flex-direction: column;
        gap: 6px;
        color: var(--muted);
        font-size: 12px;
      }
      .field.checkbox {
        flex-direction: row;
        align-items: center;
        gap: 8px;
        color: var(--muted);
      }
      .row { display: flex; gap: 12px; flex-wrap: wrap; }
      button {
        background: var(--accent);
        color: #0b0f14;
        border: none;
        border-radius: 10px;
        padding: 10px 16px;
        font-weight: 700;
        cursor: pointer;
      }
      button.secondary {
        background: transparent;
        color: var(--ink);
        border: 1px solid rgba(255,255,255,0.2);
      }
      .pill {
        display: inline-block;
        padding: 6px 12px;
        border-radius: 999px;
        border: 1px solid rgba(255,255,255,0.18);
        color: var(--muted);
        font-size: 12px;
        margin-bottom: 12px;
      }
      .output {
        background: #0c1219;
        border: 1px solid rgba(255,255,255,0.12);
        border-radius: 12px;
        padding: 12px;
        min-height: 140px;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
        font-size: 13px;
        white-space: pre-wrap;
      }
      .kpi {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 12px;
        margin-top: 16px;
      }
      .kpi .card { padding: 14px; text-align: center; }
      .kpi .value { font-size: 24px; font-weight: 700; }
      .kpi .label { font-size: 12px; color: var(--muted); }
      @media (max-width: 900px) {
        .hero { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="hero">
        <div>
          <div class="pill">SentinelAI Demo UI</div>
          <h1 class="title">Verify claims. Detect spoofing. Stop fraud rings.</h1>
          <p class="subtitle">A minimal front-end for the dummy risk scoring API. Paste or edit JSON, then score the claim in real time.</p>
          <div class="row">
            <button id="scoreBtn">Score Claim</button>
            <button id="loadSample" class="secondary">Load Sample</button>
          </div>
        </div>
        <div class="card">
          <div class="output" id="output">Waiting for a claim...</div>
          <div class="kpi">
            <div class="card">
              <div class="value" id="riskScore">—</div>
              <div class="label">Risk Score</div>
            </div>
            <div class="card">
              <div class="value" id="riskBand">—</div>
              <div class="label">Risk Band</div>
            </div>
            <div class="card">
              <div class="value" id="claimId">—</div>
              <div class="label">Claim ID</div>
            </div>
          </div>
        </div>
      </div>

      <div class="card" style="margin-top: 20px;">
        <h3 style="margin-top:0">Quick Inputs</h3>
        <div class="row" style="margin-bottom:12px;">
          <label class="field">
            <span>Claim ID</span>
            <input id="claimIdInput" placeholder="CLM-001" />
          </label>
          <label class="field">
            <span>User ID</span>
            <input id="userIdInput" placeholder="USR-42" />
          </label>
          <label class="field">
            <span>Device ID</span>
            <input id="deviceIdInput" placeholder="DEV-9" />
          </label>
          <label class="field">
            <span>OS</span>
            <select id="osInput">
            <option>Android</option>
            <option>iOS</option>
            </select>
          </label>
          <label class="field checkbox">
            <span>Emulator</span>
            <input type="checkbox" id="emulatorInput" />
          </label>
        </div>
        <div class="row" style="margin-bottom:12px;">
          <label class="field">
            <span>Lat 1</span>
            <input id="lat1" placeholder="12.9716" />
          </label>
          <label class="field">
            <span>Lon 1</span>
            <input id="lon1" placeholder="77.5946" />
          </label>
          <label class="field">
            <span>TS 1 (ISO)</span>
            <input id="t1" placeholder="2026-03-20T10:00:00Z" />
          </label>
        </div>
        <div class="row" style="margin-bottom:12px;">
          <label class="field">
            <span>Lat 2</span>
            <input id="lat2" placeholder="12.9720" />
          </label>
          <label class="field">
            <span>Lon 2</span>
            <input id="lon2" placeholder="77.5950" />
          </label>
          <label class="field">
            <span>TS 2 (ISO)</span>
            <input id="t2" placeholder="2026-03-20T10:00:10Z" />
          </label>
        </div>
        <div class="row" style="margin-bottom:12px;">
          <label class="field">
            <span>Lat 3</span>
            <input id="lat3" placeholder="12.9800" />
          </label>
          <label class="field">
            <span>Lon 3</span>
            <input id="lon3" placeholder="77.6000" />
          </label>
          <label class="field">
            <span>TS 3 (ISO)</span>
            <input id="t3" placeholder="2026-03-20T10:00:15Z" />
          </label>
        </div>
        <div class="row">
          <button id="buildPayload" class="secondary">Build JSON</button>
        </div>
      </div>

      <div class="card" style="margin-top: 20px;">
        <h3 style="margin-top:0">Claim Payload</h3>
        <textarea id="payload"></textarea>
      </div>
    </div>

    <script>
      const output = document.getElementById("output");
      const payload = document.getElementById("payload");
      const riskScore = document.getElementById("riskScore");
      const riskBand = document.getElementById("riskBand");
      const claimId = document.getElementById("claimId");

      const sample = {
        "claim_id": "CLM-001",
        "user_id": "USR-42",
        "gps": [
          {"lat": 12.9716, "lon": 77.5946, "ts": "2026-03-20T10:00:00Z"},
          {"lat": 12.9720, "lon": 77.5950, "ts": "2026-03-20T10:00:10Z"},
          {"lat": 12.9800, "lon": 77.6000, "ts": "2026-03-20T10:00:15Z"}
        ],
        "device": {
          "device_id": "DEV-9",
          "os": "Android",
          "model": "Pixel 7",
          "emulator": false
        },
        "sensors": [
          {"accel": 1.2, "gyro": 0.2, "ts": "2026-03-20T10:00:01Z"},
          {"accel": 25.0, "gyro": 11.0, "ts": "2026-03-20T10:00:03Z"}
        ],
        "weather": "rain"
      };

      function setSample() {
        payload.value = JSON.stringify(sample, null, 2);
        document.getElementById("claimIdInput").value = sample.claim_id;
        document.getElementById("userIdInput").value = sample.user_id;
        document.getElementById("deviceIdInput").value = sample.device.device_id;
        document.getElementById("osInput").value = sample.device.os;
        document.getElementById("emulatorInput").checked = sample.device.emulator;
        document.getElementById("lat1").value = sample.gps[0].lat;
        document.getElementById("lon1").value = sample.gps[0].lon;
        document.getElementById("t1").value = sample.gps[0].ts;
        document.getElementById("lat2").value = sample.gps[1].lat;
        document.getElementById("lon2").value = sample.gps[1].lon;
        document.getElementById("t2").value = sample.gps[1].ts;
        document.getElementById("lat3").value = sample.gps[2].lat;
        document.getElementById("lon3").value = sample.gps[2].lon;
        document.getElementById("t3").value = sample.gps[2].ts;
      }

      function numOr(val, fallback) {
        const n = Number(val);
        return Number.isFinite(n) ? n : fallback;
      }

      function buildPayload() {
        const claim = {
          claim_id: document.getElementById("claimIdInput").value || "CLM-001",
          user_id: document.getElementById("userIdInput").value || "USR-42",
          gps: [
            { lat: numOr(document.getElementById("lat1").value, sample.gps[0].lat), lon: numOr(document.getElementById("lon1").value, sample.gps[0].lon), ts: document.getElementById("t1").value || sample.gps[0].ts },
            { lat: numOr(document.getElementById("lat2").value, sample.gps[1].lat), lon: numOr(document.getElementById("lon2").value, sample.gps[1].lon), ts: document.getElementById("t2").value || sample.gps[1].ts },
            { lat: numOr(document.getElementById("lat3").value, sample.gps[2].lat), lon: numOr(document.getElementById("lon3").value, sample.gps[2].lon), ts: document.getElementById("t3").value || sample.gps[2].ts }
          ],
          device: {
            device_id: document.getElementById("deviceIdInput").value || "DEV-9",
            os: document.getElementById("osInput").value,
            model: "Pixel 7",
            emulator: document.getElementById("emulatorInput").checked
          },
          sensors: sample.sensors,
          weather: sample.weather
        };
        payload.value = JSON.stringify(claim, null, 2);
      }

      async function score() {
        let body;
        try {
          body = JSON.parse(payload.value);
        } catch (e) {
          output.textContent = "Invalid JSON payload.";
          return;
        }

        output.textContent = "Scoring...";
        const res = await fetch("/claims/score", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body)
        });

        const data = await res.json();
        output.textContent = JSON.stringify(data, null, 2);
        riskScore.textContent = data.risk_score ?? "—";
        riskBand.textContent = data.risk_band ?? "—";
        claimId.textContent = data.claim_id ?? "—";
      }

      document.getElementById("scoreBtn").addEventListener("click", score);
      document.getElementById("loadSample").addEventListener("click", setSample);
      document.getElementById("buildPayload").addEventListener("click", buildPayload);
      document.querySelectorAll("#claimIdInput,#userIdInput,#deviceIdInput,#osInput,#emulatorInput,#lat1,#lon1,#t1,#lat2,#lon2,#t2,#lat3,#lon3,#t3")
        .forEach(el => el.addEventListener("input", buildPayload));
      setSample();
    </script>
  </body>
</html>
